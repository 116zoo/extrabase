<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competitor Monitor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">📡 Competitor Monitor</div>
      <div class="header-controls">
        <label for="domain-select" class="sr-only">Domaine</label>
        <select id="domain-select" class="domain-select">
          <option value="">Chargement…</option>
        </select>
      </div>
    </div>
  </header>

  <!-- STATS BAR -->
  <section class="stats-bar">
    <div class="stat-card" data-type="new_page">
      <span class="stat-count" id="stat-new">0</span>
      <span class="stat-label">Nouvelles pages</span>
    </div>
    <div class="stat-card" data-type="removed_page">
      <span class="stat-count" id="stat-removed">0</span>
      <span class="stat-label">Pages supprimées</span>
    </div>
    <div class="stat-card" data-type="schema_changed">
      <span class="stat-count" id="stat-schema">0</span>
      <span class="stat-label">Schémas modifiés</span>
    </div>
    <div class="stat-card" data-type="meta_changed">
      <span class="stat-count" id="stat-meta">0</span>
      <span class="stat-label">Metas modifiées</span>
    </div>
    <div class="stat-card" data-type="title_changed">
      <span class="stat-count" id="stat-title">0</span>
      <span class="stat-label">Titres modifiés</span>
    </div>
  </section>

  <!-- FILTERS -->
  <section class="filters">
    <select id="filter-competitor" class="filter-select">
      <option value="">Tous les concurrents</option>
    </select>
    <select id="filter-type" class="filter-select">
      <option value="">Tous les changements</option>
      <option value="new_page">Nouvelle page</option>
      <option value="removed_page">Page supprimée</option>
      <option value="schema_changed">Schéma modifié</option>
      <option value="meta_changed">Meta modifiée</option>
      <option value="title_changed">Titre modifié</option>
      <option value="h1_changed">H1 modifié</option>
      <option value="content_updated">Contenu mis à jour</option>
    </select>
    <select id="filter-days" class="filter-select">
      <option value="7">7 derniers jours</option>
      <option value="30" selected>30 derniers jours</option>
      <option value="90">90 derniers jours</option>
      <option value="365">1 an</option>
    </select>
    <button id="btn-refresh" class="btn-refresh">↻ Actualiser</button>
  </section>

  <!-- TIMELINE -->
  <main class="timeline" id="timeline">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📊</div>
      <p>Sélectionnez un domaine pour afficher les changements.</p>
    </div>
  </main>

  <!-- DETAIL PANEL -->
  <aside class="detail-panel" id="detail-panel">
    <button class="close-btn" id="close-detail" aria-label="Fermer">✕</button>
    <div id="detail-content"></div>
  </aside>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <script src="/app.js"></script>
</body>
</html>
