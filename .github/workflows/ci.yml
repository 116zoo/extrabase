name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml reportlab pytest pytest-mock responses

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify agent files exist
        run: |
          for f in agents/audit-seo.md agents/audit-geo.md agents/audit-aeo.md \
                   agents/audit-competitors.md agents/apply-fixes.md agents/reports.md; do
            [ -f "$f" ] || (echo "Missing: $f" && exit 1)
          done
          echo "All agent files present"

      - name: Verify script files exist
        run: |
          for f in scripts/fetch_page.py scripts/pagespeed_client.py scripts/gsc_connector.py \
                   scripts/ga4_connector.py scripts/dataforseo_client.py \
                   scripts/competitor_scraper.py scripts/pdf_report.py; do
            [ -f "$f" ] || (echo "Missing: $f" && exit 1)
          done
          echo "All script files present"

      - name: Verify SKILL.md frontmatter
        run: |
          head -5 SKILL.md | grep -q "name:" || (echo "SKILL.md missing name: frontmatter" && exit 1)
          echo "SKILL.md frontmatter OK"
