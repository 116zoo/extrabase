name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check agent files
        run: |
          for f in \
            agents/audit-seo.md \
            agents/audit-geo.md \
            agents/audit-aeo.md \
            agents/audit-competitors.md \
            agents/audit-pages.md \
            agents/audit-free-serp.md \
            agents/apply-fixes.md \
            agents/reports.md
          do
            [ -f "$f" ] || (echo "Missing: $f" && exit 1)
          done

      - name: Check script files
        run: |
          for f in \
            scripts/fetch_page.py \
            scripts/pagespeed_client.py \
            scripts/gsc_connector.py \
            scripts/ga4_connector.py \
            scripts/dataforseo_client.py \
            scripts/free_serp_client.py \
            scripts/competitor_scraper.py \
            scripts/crawl_site.py \
            scripts/audit_all_pages.py \
            scripts/pdf_report.py
          do
            [ -f "$f" ] || (echo "Missing: $f" && exit 1)
          done
